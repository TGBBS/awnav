<script type="text/javascript">
    window.initCardLazyImages = function(root){
        var scope = root && root.querySelectorAll ? root : document;
        var lazyImages = scope.querySelectorAll('img.card-logo-img[data-src]');
        if (!lazyImages.length) {
            return;
        }

        var activateImage = function(img) {
            if (!img || img.dataset.loaded === '1') {
                return;
            }
            var src = img.getAttribute('data-src');
            if (src) {
                img.src = src;
            }
            img.dataset.loaded = '1';
        };

        if ('IntersectionObserver' in window) {
            if (!window.__cardLogoObserver) {
                window.__cardLogoObserver = new IntersectionObserver(function(entries, observer) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting || entry.intersectionRatio > 0) {
                            activateImage(entry.target);
                            observer.unobserve(entry.target);
                        }
                    });
                }, {
                    rootMargin: '300px 0px'
                });
            }

            Array.prototype.forEach.call(lazyImages, function(img) {
                if (img.dataset.loaded === '1' || img.dataset.observing === '1') {
                    return;
                }
                img.dataset.observing = '1';
                window.__cardLogoObserver.observe(img);
            });
            return;
        }

        Array.prototype.forEach.call(lazyImages, activateImage);
    };

    $(document).ready(function(){
        window.initCardLazyImages(document);
        $('a[href]').each(function(){
            var href = $(this).attr('href') || '';
            if (!href || href.indexOf('#') === 0 || href.indexOf('javascript:') === 0 || href.indexOf('mailto:') === 0 || href.indexOf('tel:') === 0) {
                return;
            }
            if ($(this).is('[data-toggle],[data-target],.tab-noajax,.no-new-window')) {
                return;
            }
            $(this).attr('target', '_blank').attr('rel', 'noopener noreferrer');
        });
        var siteWelcome = $('#loading');
        siteWelcome.addClass('close');
        setTimeout(function() {
            siteWelcome.remove();
        }, 600);
    });
</script>
<script>        
    $(document).ready(function(){
        setTimeout(function () {
            if ($('a.smooth[href="' + window.location.hash + '"]')[0]) {
                $('a.smooth[href="' + window.location.hash + '"]').click();
            }else if (window.location.hash != '') {
                $("html, body").animate({
                    scrollTop: $(window.location.hash).offset().top - 90
                }, {
                    duration: 500,
                    easing: "swing"
                });
            }
        }, 300);
        $(document).on('click','a.smooth',function(ev) {
            if($('#sidebar').hasClass('show') && !$(this).hasClass('change-href')){
                $('#sidebar').modal('toggle');
            }
            if($(this).attr("href").substr(0, 1) == "#"){
                $("html, body").animate({
                    scrollTop: $($(this).attr("href")).offset().top - 90
                }, {
                    duration: 500,
                    easing: "swing"
                });
            }
            if($(this).hasClass('go-search-btn')){
                $('#search-text').focus();
            }
            if(!$(this).hasClass('change-href')){
                var menu =  $("a"+$(this).attr("href"));
                menu.click();
                toTarget(menu.parent().parent(),true,true);
            }
        });
        $(document).on('click','a.tab-noajax',function(ev) {
            var url = $(this).data('link');
            if(url)
                $(this).parents('.d-flex.flex-fill.flex-tab').children('.btn-move.tab-move').show().attr('href', url);
            else
                $(this).parents('.d-flex.flex-fill.flex-tab').children('.btn-move.tab-move').hide();
        });
        
    });
</script>

<script>
//夜间(日间)模式
(function(){
    if(document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") === ''){
        if(new Date().getHours() > 22 || new Date().getHours() < 6){
            document.body.classList.remove('io-black-mode');
            document.body.classList.add('io-grey-mode');
            document.cookie = "night=1;path=/";
            console.log('夜间模式开启');
        }else{
            document.body.classList.remove('night');
            document.cookie = "night=0;path=/";
            console.log('夜间模式关闭');
        }
    }else{
        var night = document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") || '0';
        if(night == '0'){
            document.body.classList.remove('night');
        }else if(night == '1'){
            document.body.classList.add('night');
        }
    }
})();
//夜间(日间)模式切换
$("#search-bg").css("background-image", "url({{ $.Site.Params.images.searchImageL }})");   //默认浅色背景
function switchNightMode(){
    var night = document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") || '0';
    if(night == '0'){
	$("#search-bg").css("background-image", "url({{ $.Site.Params.images.searchImageL }})");
        document.body.classList.remove('io-grey-mode');
        document.body.classList.add('io-black-mode');
        document.cookie = "night=1;path=/"
        console.log(' ');
        $(".switch-dark-mode").attr("data-original-title","日间模式");
        $(".mode-ico").removeClass("icon-night");
        $(".mode-ico").addClass("icon-light");
    }else{
	$("#search-bg").css("background-image", "url({{ $.Site.Params.images.searchImageD }})")
        document.body.classList.remove('io-black-mode');
        document.body.classList.add('io-grey-mode');
        document.cookie = "night=0;path=/"
        console.log(' ');
        $(".switch-dark-mode").attr("data-original-title","夜间模式");
        $(".mode-ico").removeClass("icon-light");
        $(".mode-ico").addClass("icon-night");
    }
}
</script>
<script>
function addSiteToFavorites(event){
    if (event) {
        event.preventDefault();
    }

    var title = document.title || '收藏网址';
    var url = window.location.href;

    try {
        if (window.external && typeof window.external.AddFavorite === 'function') {
            window.external.AddFavorite(url, title);
            return false;
        }
    } catch (e) {}

    try {
        if (window.sidebar && typeof window.sidebar.addPanel === 'function') {
            window.sidebar.addPanel(title, url, '');
            return false;
        }
    } catch (e) {}

    var shortcut = /Mac|iPhone|iPad|iPod/i.test(navigator.platform) ? 'Cmd+D' : 'Ctrl+D';
    alert('当前浏览器不支持直接调起收藏窗口，请按 ' + shortcut + ' 收藏此网址。');
    return false;
}
</script>
